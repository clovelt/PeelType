<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 92" width="44" height="92">
  <!-- outer body -->
  <rect x="1.5" y="1.5" width="41" height="89" rx="7" ry="7"
        fill="rgba(245,240,232,0.94)" stroke="#4a4a4a" stroke-width="0.9"/>
  <!-- adhesive dividers -->
  <line x1="1.5" y1="30" x2="42.5" y2="30" stroke="#4a4a4a" stroke-width="0.65"/>
  <line x1="1.5" y1="62" x2="42.5" y2="62" stroke="#4a4a4a" stroke-width="0.65"/>
  <!-- gauze pad -->
  <rect x="7" y="33" width="30" height="26" rx="2"
        fill="rgba(193,184,172,0.32)" stroke="none"/>
  <!-- gauze weave -->
  <line x1="13" y1="33" x2="13" y2="59" stroke="#4a4a4a" stroke-width="0.35" opacity="0.45"/>
  <line x1="19" y1="33" x2="19" y2="59" stroke="#4a4a4a" stroke-width="0.35" opacity="0.45"/>
  <line x1="25" y1="33" x2="25" y2="59" stroke="#4a4a4a" stroke-width="0.35" opacity="0.45"/>
  <line x1="31" y1="33" x2="31" y2="59" stroke="#4a4a4a" stroke-width="0.35" opacity="0.45"/>
  <line x1="7"  y1="39" x2="37" y2="39" stroke="#4a4a4a" stroke-width="0.35" opacity="0.45"/>
  <line x1="7"  y1="46" x2="37" y2="46" stroke="#4a4a4a" stroke-width="0.35" opacity="0.45"/>
  <line x1="7"  y1="53" x2="37" y2="53" stroke="#4a4a4a" stroke-width="0.35" opacity="0.45"/>
  <!-- pin hole at top (attachment point) -->
  <circle cx="22" cy="14" r="3.8" fill="rgba(245,240,232,0.5)" stroke="#4a4a4a" stroke-width="0.85"/>
  <!-- small cross detail in pin hole -->
  <line x1="22" y1="11" x2="22" y2="17" stroke="#4a4a4a" stroke-width="0.5" opacity="0.5"/>
  <line x1="19" y1="14" x2="25" y2="14" stroke="#4a4a4a" stroke-width="0.5" opacity="0.5"/>
  <!-- bottom label lines -->
  <line x1="11" y1="72" x2="33" y2="72" stroke="#4a4a4a" stroke-width="0.5" opacity="0.4"/>
  <line x1="14" y1="79" x2="30" y2="79" stroke="#4a4a4a" stroke-width="0.5" opacity="0.3"/>
</svg>
